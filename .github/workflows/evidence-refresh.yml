name: Evidence Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: write

concurrency:
  group: evidence-refresh
  cancel-in-progress: false

jobs:
  refresh-evidence-library:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      RPS_LLM_API_KEY: ${{ secrets.RPS_LLM_API_KEY }}
      RPS_LLM_BASE_URL: ${{ secrets.RPS_LLM_BASE_URL }}
      RPS_LLM_ORG_ID: ${{ secrets.RPS_LLM_ORG_ID }}
      RPS_LLM_PROJECT_ID: ${{ secrets.RPS_LLM_PROJECT_ID }}
      RPS_LLM_MODEL: ${{ secrets.RPS_LLM_MODEL }}
      RPS_LLM_TEMPERATURE: ${{ secrets.RPS_LLM_TEMPERATURE }}
      RPS_LLM_REASONING_EFFORT: ${{ secrets.RPS_LLM_REASONING_EFFORT }}
      RPS_LLM_REASONING_SUMMARY: ${{ secrets.RPS_LLM_REASONING_SUMMARY }}
      RPS_LLM_MAX_COMPLETION_TOKENS: ${{ secrets.RPS_LLM_MAX_COMPLETION_TOKENS }}
      ATHLETE_WORKSPACE_ROOT: runtime/athletes
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh evidence library
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if python3 scripts/refresh_evidence_library.py --discover; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 30
          done

      - name: Configure git
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit refreshed evidence library
        if: ${{ success() }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No evidence-library changes detected."
            exit 0
          fi
          git add skills/shared/durability-methodology/references scripts/refresh_evidence_library.py
          git commit -m "Refresh evidence library"

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep 10
          done
