- id: dur_app_003
  source_kind: applied
  authors: CTS / Gallo
  year: 2024
  title: How Carbohydrate Fueling Affects Durability in Long Workouts
  journal_or_outlet: CTS Podcast Ep. 208
  source_type: podcast
  study_type: podcast
  reference_locator: Episode 208
  verification_status: verified
  locator_source: outlet
  topic_tags:
  - fueling
  - durability
  - brevet_ultra
  question_or_focus: Explain how carbohydrate fueling strategy affects durability
    in long workouts.
  population_or_scope: Applied fueling discussion for long workouts and long-event
    preparation.
  what_was_examined: []
  core_concepts:
  - Fueling quality materially affects late-session durability and execution quality.
  - Durability is not only muscular or cardiovascular; substrate support matters too.
  - Practical nutrition decisions can change what the athlete can preserve late in
    the session.
  important_findings:
  - Provides accessible practice translation for why carbohydrate intake influences
    late-work quality.
  - Helps athletes understand that fade is often partly nutritional, not purely motivational
    or fitness-related.
  - Useful in connecting fueling plans to long-session outcomes.
  practical_implications:
  - Use when explaining practical fueling support behind durability-first long-ride
    design.
  - Helpful for athlete guidance on why a “test” ride without fueling may misrepresent
    real event capability.
  - Do not treat it as sole evidence authority for exact CHO targets.
  key_takeaways:
  - Connects fueling strategy with late-session durability.
  - Highlights nutrition as part of fatigue resistance.
  - Useful for practical long-ride fueling discussion.
  what_this_does_not_justify: []
  important_limits:
  - Practitioner source only.
  - Specific intake recommendations still need stronger source support where possible.
