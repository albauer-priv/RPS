- id: dur_app_002
  source_kind: applied
  authors: CTS / Time-Crunched Cyclist
  year: 2024
  title: BulletProof Your Fatigue Resistance
  journal_or_outlet: CTS Podcast Ep. 207
  source_type: podcast
  study_type: podcast
  reference_locator: Episode 207
  verification_status: verified
  locator_source: outlet
  topic_tags:
