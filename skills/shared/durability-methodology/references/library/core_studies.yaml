  question_or_focus: Summarize the scientific basis of tapering before competition.
  population_or_scope: General endurance taper review; applicable as a strategic framework,
    not as a rigid event-week template.
  what_was_examined: []
  core_concepts:
  - Effective tapering typically reduces training volume while preserving useful readiness
    and specificity.
  - Freshening is not equivalent to simply doing less of everything at random.
  - Taper quality depends on fatigue removal without flattening the athlete.
  important_findings:
  - Provides the classic evidence base for reduced-volume, quality-preserving taper
    logic.
  - Explains why late-phase load reduction should be structured rather than interpreted
    as normal build progression.
  - Supports the idea that event-contained work can coexist with reduced training
    load.
  practical_implications:
  - In RPS, this supports taper/freshening semantics where load bands early in taper
    are labels, not build permission.
  - Useful for explaining why final taper weeks should remove accumulated fatigue
    without losing event sharpness.
  - Supports blocking heavy K3/threshold/VO2 style fatigue late in taper.
  key_takeaways:
  - Supports reduced-volume taper logic with maintained readiness.
  - Frames tapering as fatigue removal with preserved race readiness.
  - Helps distinguish tapering from simple undertraining.
  what_this_does_not_justify: []
  important_limits:
  - General taper review; event-specific implementation still needs local constraints.
  - Does not prescribe one exact taper shape for every endurance event.
