- id: dur_core_002
  source_kind: core
  authors: Valenzuela, P. L., Alejo, L. B., Ozcoidi, L. M., Lucia, A., Santalla, A.,
    & Barranco-Gil, D.
  year: 2023
  title: 'Durability in professional cyclists: a field study'
  journal_or_outlet: International Journal of Sports Physiology and Performance
  source_type: peer_reviewed
  study_type: peer_reviewed
  reference_locator: https://doi.org/10.1123/ijspp.2022-0243
  verification_status: verified
  locator_source: doi
  topic_tags:
  - durability
  - fatigue_resistance
  - brevet_ultra
  question_or_focus: Examine durability in real professional-road-cycling conditions
    rather than only in laboratory settings.
  population_or_scope: Field study in professional cyclists; most applicable as high-level
    performance context, not as a direct magnitude transfer to amateurs or masters.
  what_was_examined: []
  core_concepts:
  - Durability can be studied under race-like accumulated work in the field.
  - Real-world fatigue resistance matters even among athletes with already high fresh
    physiological capacity.
  - Field durability assessment complements laboratory profiling.
  important_findings:
  - Shows that late-session performance behavior can separate athletes even in a highly
    trained cohort.
  - Supports the idea that durability should be interpreted in the context of accumulated
    work, not only fresh power values.
  - Strengthens the case for using event-like or long-ride observations alongside
    lab testing.
  practical_implications:
  - For RPS, prefer durability evidence from long rides, rehearsal events, and pre-fatigued
    execution over fresh tests alone.
  - Use the paper as support for field-context reasoning, not as a direct source of
    week-by-week numeric targets.
  - Treat professional-cycling magnitudes cautiously when planning brevet/masters
    athletes.
  key_takeaways:
  - Supports field-based durability assessment.
  - Links real-world fatigue resistance with performance.
  - Reinforces that durability is visible under actual race workload.
  what_this_does_not_justify: []
  important_limits:
  - Professional cycling context; do not over-transfer specific magnitudes.
  - Field data improves ecological validity but limits universal prescription detail.
  allowed_uses:
  - durability_definition
  - field_context
  authority_limit: justification_only
  evidence_posture: metadata_only_not_activatable
