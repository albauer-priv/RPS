  question_or_focus: Review how cycling race simulations and durability-assessment
    protocols are designed and what they can and cannot tell us.
  population_or_scope: Review of cycling-specific durability assessment methods and
    race-simulation logic.
  what_was_examined: []
  core_concepts:
  - Durability assessment depends heavily on protocol design and simulation realism.
  - Not every race simulation measures the same thing or imposes the same preload.
  - Method choice influences the interpretation of durability outcomes.
  important_findings:
  - Highlights that simulation structure, preload, and measurement timing materially
    affect durability conclusions.
  - Explains why protocol drift can make cross-study comparisons messy.
  - Supports a more critical reading of claims that a given test fully captures race-like
    durability.
  practical_implications:
  - In RPS, use this when choosing or interpreting rehearsal sessions and durability
    diagnostics.
  - Do not treat one short protocol as a universal replacement for event-like long-ride
    evidence.
  - Helpful for explaining why field context and accumulated-work realism matter.
  key_takeaways:
  - Reviews durability assessment protocols and simulation limits.
  - Shows that protocol design shapes what durability evidence means.
  - Supports caution when comparing studies or field tests.
