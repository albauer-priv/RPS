- id: dur_core_004
  source_kind: core
  authors: Spragg, J., Leo, P., & Swart, J.
  year: 2023
  title: The relationship between physiological characteristics and durability in
    male professional cyclists
  journal_or_outlet: Medicine & Science in Sports & Exercise
  source_type: peer_reviewed
  study_type: peer_reviewed
  reference_locator: https://doi.org/10.1249/MSS.0000000000003019
  verification_status: verified
  locator_source: doi
  topic_tags:
  - durability
  - repeatability
  - metabolic_efficiency
  question_or_focus: Relate durability in professional cyclists to standard physiological
    characteristics and assess whether fresh markers fully explain fatigue resistance.
  population_or_scope: Male professional cyclists; best used for concept separation
    and metric interpretation.
  what_was_examined: []
  core_concepts:
  - Durability relates to but is not identical with fresh physiological capacity.
  - Athletes can share similar fresh markers while differing meaningfully in late-session
    resilience.
  - Performance determinants are multi-dimensional once long-duration fatigue enters
    the picture.
  important_findings:
  - Supports durability as a distinct explanatory dimension in high-level cycling
    performance.
  - Shows why planners should be cautious when using threshold or VO2 markers as total
    proxies for race ability.
  - Strengthens the profiling case for combining fresh tests with long-duration execution
    evidence.
  practical_implications:
  - In RPS, avoid letting one fresh KPI dominate long-event readiness decisions.
  - Use this source when explaining why durability-oriented planning remains justified
    even if fresh metrics improve only modestly.
  - Supports richer athlete profiling where stable late-session execution matters.
  key_takeaways:
  - Durability relates to, but is not reducible to, fresh physiological markers.
  - Supports separate interpretation of fresh capacity and fatigue resistance.
  - Pushes against one-metric explanations of endurance success.
  what_this_does_not_justify: []
  important_limits:
  - Professional male cycling population.
  - Conceptually useful, but not a direct planning algorithm.
  allowed_uses:
  - durability_definition
  - metric_interpretation
  authority_limit: justification_only
  evidence_posture: metadata_only_not_activatable
