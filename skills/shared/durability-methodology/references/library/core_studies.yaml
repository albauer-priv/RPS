- id: dur_core_013
  source_kind: core
  authors: Buchheit, M., & Laursen, P. B.
  year: 2013
  title: High-intensity interval training, solutions to the programming puzzle
  journal_or_outlet: Sports Medicine
  source_type: review
  study_type: review
  reference_locator: https://doi.org/10.1007/s40279-013-0029-x
  verification_status: verified
  locator_source: doi
  topic_tags:
  - vo2max
  - intensity_distribution
  - progressive_overload
  question_or_focus: Organize HIIT programming decisions and explain how interval
    structure affects adaptation and fatigue cost.
  population_or_scope: Programming review for high-intensity interval training across
    endurance contexts.
  what_was_examined: []
  core_concepts:
  - HIIT programming is a dose-and-structure problem, not just an intensity label.
  - Interval format, density, and recovery design materially change the training signal.
  - Hard work has to be programmed with constraint awareness, not enthusiasm alone.
  important_findings:
  - Explains why superficially similar HIIT sessions can differ greatly in cost and
    intent.
  - Helps planners think in terms of interval architecture, density, and adaptation
    tradeoffs.
  - Supports bounded, purpose-specific use of hard work inside a broader program.
  practical_implications:
  - In RPS, use this when explaining why VO2 work needs explicit purpose, spacing,
    and density control.
  - Helpful for rejecting “more hard reps” as a default progression axis.
  - Supports the one-axis-at-a-time and recovery-first overload rules.
  key_takeaways:
  - Provides a structured lens for HIIT programming.
  - Supports restrained intensity use rather than uncontrolled density stacking.
  - Frames HIIT as a programmable tool, not an identity.
  what_this_does_not_justify: []
  important_limits:
  - Context source for HIIT structure, not default justification for Scenario C intensity
    escalation.
  - Does not override durability-led or taper-led planning authority.
