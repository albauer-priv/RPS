  year: 2025
  title: What is a cycling race simulation anyway? A review on protocols to assess
    durability in cycling
  journal_or_outlet: European Journal of Applied Physiology
  source_type: review
  study_type: review
  reference_locator: https://doi.org/10.1007/s00421-025-05725-1
