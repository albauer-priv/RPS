  question_or_focus: Summarize best-practice thinking on intensity and duration distribution
    in endurance training.
  population_or_scope: Broad endurance-sport review; applicable as high-level distribution
    logic rather than a one-size-fits-all recipe.
  what_was_examined: []
  core_concepts:
  - Endurance performance depends not only on total work but on how intensity is distributed
    across training.
  - A disciplined endurance-heavy distribution often supports sustainable development.
  - Intensity distribution is a structural choice, not a license for simplistic ideology.
  important_findings:
  - Provides a widely cited rationale for endurance-heavy and carefully bounded higher-intensity
    distribution.
  - Supports the idea that strong endurance outcomes can coexist with limited but
    purposeful higher-intensity work.
  - Strengthens the case against threshold-saturated monotony as a default.
  practical_implications:
  - In RPS, use this for broad intensity-distribution framing, especially when defending
    endurance-led macrocycle design.
  - Do not misuse it as a direct weekly formula for every athlete or event context.
  - Helpful when explaining why more intensity is not automatically better.
  key_takeaways:
  - Supports disciplined endurance intensity distribution.
  - Frames distribution as a strategic planning choice.
  - Favors structure over random intensity accumulation.
