- id: dur_core_001
  source_kind: core
  authors: Maunder, E., Seiler, S., Mildenhall, M. J., Kilding, A. E., & Plews, D.
    J.
  year: 2021
  title: The Importance of 'Durability' in the Physiological Profiling of Endurance
    Athletes
  journal_or_outlet: Sports Medicine
  source_type: review
  study_type: review
  reference_locator: https://pubmed.ncbi.nlm.nih.gov/33886100/
  verification_status: verified
  locator_source: pubmed
  topic_tags:
  - durability
  - fatigue_resistance
  - repeatability
  question_or_focus: Clarify what durability means in endurance sport and why fresh
    physiological profiling misses an important performance dimension.
  population_or_scope: Conceptual Sports Medicine review across endurance sport, used
    here primarily for cycling and long-duration planning interpretation.
  what_was_examined: []
  core_concepts:
  - Durability is the ability to preserve performance and physiological control as
    work accumulates over time.
  - Late-session performance should be interpreted relative to energetic preload,
    not as if the athlete were fresh.
  - Fresh peak markers such as VO2max, FTP, or threshold values do not fully describe
    how well an athlete resists prolonged fatigue.
  important_findings:
  - Argues that endurance profiling should include pre-fatigued assessment, not only
    rested testing.
  - Explains that the same fresh physiological profile can produce different late-session
    outcomes once workload accumulates.
  - Connects durability with pacing stability, drift behavior, and resistance to multi-system
    decline over long sessions.
  practical_implications:
  - Use durability as a season/phase planning lens when the athlete targets long events,
    not only as a retrospective metric.
  - Do not infer long-event readiness from fresh FTP/VO2max values alone.
  - Interpret late-session fade, drift, and execution stability as meaningful planning
    signals.
  key_takeaways:
  - Defines durability as performance preservation under prolonged work.
  - Separates durability from fresh peak metrics.
  - Frames durability as a distinct profiling target, not a side-note.
  what_this_does_not_justify: []
  important_limits:
  - Conceptual review; not a direct planning prescription.
  - Does not provide one universal field test or a fixed numeric durability threshold.
  allowed_uses:
  - durability_definition
  - durability_rationale
  authority_limit: justification_only
