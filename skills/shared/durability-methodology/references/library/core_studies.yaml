  source_kind: core
  authors: Meixner, B. J., Joyner, M. J., & Sperlich, B.
  year: 2025
  title: 'Durability, fatigability, repeatability, and resilience in endurance sports:
    definitions, distinctions, and implications'
  journal_or_outlet: Journal of Applied Physiology
  source_type: review
  study_type: review
  reference_locator: https://doi.org/10.1152/japplphysiol.00343.2025
