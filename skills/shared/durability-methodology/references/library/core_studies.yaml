- id: dur_core_005
  source_kind: core
  authors: Matomäki, J., et al.
  year: 2023
  title: Durability is improved by both low and high intensity endurance training
  journal_or_outlet: Frontiers in Physiology
  source_type: peer_reviewed
  study_type: peer_reviewed
  reference_locator: https://doi.org/10.3389/fphys.2023.1138273
  verification_status: verified
  locator_source: doi
  topic_tags:
  - durability
  - intensity_distribution
  - progressive_overload
  question_or_focus: Test whether both low-intensity and high-intensity endurance
    training can improve durability.
  population_or_scope: Endurance-training intervention context; useful for intensity-distribution
    nuance rather than absolutist method claims.
  what_was_examined: []
  core_concepts:
  - Durability can improve through more than one training route.
  - Low intensity and high intensity are not mutually exclusive in durability development.
  - Programming quality depends on dose, context, and recoverability, not slogans.
  important_findings:
  - Suggests durability is trainable across different intensity emphases when the
    program is coherent.
  - Undercuts simplistic claims that only easy volume or only hard work can build
    durability.
  - Supports a programming view where total structure and recovery matter as much
    as isolated intensity labels.
  practical_implications:
  - In RPS, this supports durability-first planning that uses mainly volume/work expansion
    but does not ban all quality work.
  - Do not translate the study into permission for uncontrolled intensity density.
  - Useful when explaining why limited threshold/HIIT support can coexist with a durability-led
    plan.
  key_takeaways:
  - Both low- and high-intensity endurance work can improve durability.
  - Supports context-dependent programming instead of one-method absolutism.
  - Reinforces that durability development does not belong to one ideology.
  what_this_does_not_justify: []
  important_limits:
  - Does not justify unrestricted intensity density.
  - Use for strategic context, not as a universal template for every athlete.
  allowed_uses:
  - progression_logic
  - intensity_context
  authority_limit: justification_only
  evidence_posture: metadata_only_not_activatable
  fulltext_status: link_only
  fulltext_local_path: ''
