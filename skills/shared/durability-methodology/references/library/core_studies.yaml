  - repeatability
  - masters
  question_or_focus: Clarify the distinctions between durability, fatigability, repeatability,
    and resilience in endurance sport.
  population_or_scope: Terminology and conceptual review across endurance sports;
    useful for language discipline and concept separation.
  what_was_examined: []
  core_concepts:
  - Durability, fatigability, repeatability, and resilience are related but not interchangeable
    constructs.
  - Clear terminology matters because sloppy labels create bad planning and bad interpretation.
  - Different constructs answer different questions about performance decline and
    recovery.
  important_findings:
  - Explains why durability should not be used as a catch-all label for every fatigue-related
    phenomenon.
  - Helps separate within-session preservation, between-effort repeatability, and
    broader resilience concepts.
  - Improves methodological clarity when discussing testing, profiling, and program
    design.
  practical_implications:
  - Use this source to keep RPS language precise when explaining athlete status or
    plan intent.
  - Helpful for avoiding conceptual drift between long-session durability and repeatability
    of hard intervals.
  - Supports clean distinctions in audit and review commentary.
  key_takeaways:
  - Clarifies terminology between durability and adjacent concepts.
  - Reduces conceptual slippage in performance discussions.
  - Supports more precise communication in planning and review.
