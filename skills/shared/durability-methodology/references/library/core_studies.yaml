- id: dur_core_003
  source_kind: core
  authors: Leo, P., Giorgi, A., Spragg, J., González, B. M., & Mujika, I.
  year: 2022
  title: 'Impact of prior accumulated work and intensity on power output in elite
    road cyclists: a pilot study'
  journal_or_outlet: German Journal of Exercise and Sport Research
  source_type: peer_reviewed
  study_type: peer_reviewed
  reference_locator: https://doi.org/10.1007/s12662-022-00818-x
  verification_status: verified
  locator_source: doi
  topic_tags:
  - durability
  - fatigue_resistance
  - progressive_overload
  question_or_focus: Assess how prior accumulated work and prior intensity affect
    subsequent power output in elite road cyclists.
  population_or_scope: Pilot study in elite road cyclists; useful mainly as preload-aware
    interpretation evidence.
  what_was_examined: []
  core_concepts:
  - Prior work changes the meaning of later power output.
  - Durability interpretation must consider both how much work has been done and how
    hard that work was.
  - Late-session performance decline is context-sensitive, not an isolated trait.
  important_findings:
  - Supports the idea that accumulated workload and intensity history both shape what
    an athlete can do later.
  - Provides direct rationale for treating pre-fatigue and finish-quality work as
    meaningful planning variables.
  - Suggests that late-session decrements should not be evaluated without context
    on the work that preceded them.
  practical_implications:
  - In RPS, use this as support for durability workouts that place meaningful work
    after prior load rather than in a fresh state.
  - Do not compare late-session execution across workouts without considering the
    accumulated cost before the key block.
  - Useful as conceptual support for pre-fatigue tolerance and finish-under-load design.
  key_takeaways:
  - Prior accumulated work changes later output.
  - Supports preload-aware interpretation of late-session performance.
  - Highlights that not all fatigue exposure is interchangeable.
  what_this_does_not_justify: []
  important_limits:
  - Pilot study; use for framing, not strict thresholds.
  - Small-sample elite context limits precision for broad athlete populations.
  allowed_uses:
  - progression_logic
  - durability_rationale
  authority_limit: justification_only
  evidence_posture: metadata_only_not_activatable
