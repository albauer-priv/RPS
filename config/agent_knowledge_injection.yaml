    - path: specs/knowledge/_shared/sources/specs/mandatory_output_season_scenarios.md
    - path: specs/knowledge/_shared/sources/schemas/bundled/season_scenarios.schema.json
    - path: specs/knowledge/_shared/sources/schemas/bundled/season_scenario_selection.schema.json
    - path: specs/knowledge/_shared/sources/schemas/bundled/artefact_meta.schema.json
    - path: specs/knowledge/_shared/sources/schemas/bundled/artefact_envelope.schema.json
    modes:
      scenario:
        bundle_id: season_scenario
