# Knowledge injection model:
# - `inject`: always injected for the agent (base block).
# - `modes.<mode>.bundle_id`: selects ONE bundle for the current run mode.
# - `bundles[].inject`: injected IN ADDITION to the base block.
#   Result = base `inject` + selected bundle `inject`.
agents:
  macro_planner:
    inject:
    - path: knowledge/_shared/sources/specs/load_estimation_spec.md
      section: general
      label: LoadEstimationSpec (General section)
    - path: knowledge/_shared/sources/principles/principles_durability_first_cycling.md
    - path: knowledge/_shared/sources/evidence/durability_bibliography.md
    - path: knowledge/_shared/sources/policies/progressive_overload_policy.md
    - path: knowledge/_shared/sources/contracts/macro__meso_contract.md
    - path: knowledge/_shared/sources/contracts/data_pipeline__macro_contract.md
    - path: knowledge/_shared/sources/contracts/scenario__macro_contract.md
    - path: knowledge/_shared/sources/specs/season_brief_interface_spec.md
    - path: knowledge/_shared/sources/specs/events_interface_spec.md
    - path: knowledge/_shared/sources/specs/availability_interface_spec.md
    - path: knowledge/_shared/sources/specs/wellness_interface_spec.md
    - path: knowledge/_shared/sources/specs/season_scenarios_interface_spec.md
    - path: knowledge/_shared/sources/specs/season_scenario_selection_interface_spec.md
    - path: knowledge/_shared/sources/specs/macro_cycle_enum_spec.md
    - path: knowledge/_shared/sources/specs/agenda_enum_spec.md
    - path: knowledge/_shared/sources/specs/traceability_spec.md
    - path: knowledge/_shared/sources/specs/file_naming_spec.md
    - path: knowledge/_shared/sources/schemas/bundled/artefact_meta.schema.json
    - path: knowledge/_shared/sources/schemas/bundled/artefact_envelope.schema.json
    modes:
      season_plan:
        bundle_id: macro_season_plan
      feed_forward:
        bundle_id: macro_feed_forward
      scenario:
        bundle_id: macro_scenario
    bundles:
    - id: macro_season_plan
      inject:
      - path: knowledge/_shared/sources/specs/mandatory_output_season_plan.md
      - path: knowledge/_shared/sources/schemas/bundled/season_plan.schema.json
    - id: macro_feed_forward
      inject:
      - path: knowledge/_shared/sources/specs/load_estimation_spec.md
        section: general
        label: LoadEstimationSpec (General section)
      - path: knowledge/_shared/sources/specs/mandatory_output_macro_meso_feed_forward.md
      - path: knowledge/_shared/sources/schemas/bundled/macro_meso_feed_forward.schema.json
    - id: macro_scenario
      inject:
      - path: knowledge/_shared/sources/contracts/scenario__macro_contract.md
      - path: knowledge/_shared/sources/specs/season_scenarios_interface_spec.md
      - path: knowledge/_shared/sources/specs/season_scenario_selection_interface_spec.md
  season_scenario:
    inject:
    - path: knowledge/_shared/sources/principles/principles_durability_first_cycling.md
    - path: knowledge/_shared/sources/contracts/data_pipeline__scenario_contract.md
    - path: knowledge/_shared/sources/contracts/scenario__macro_contract.md
    - path: knowledge/_shared/sources/specs/season_brief_interface_spec.md
    - path: knowledge/_shared/sources/specs/events_interface_spec.md
    - path: knowledge/_shared/sources/specs/availability_interface_spec.md
    - path: knowledge/_shared/sources/specs/season_scenarios_interface_spec.md
    - path: knowledge/_shared/sources/specs/season_scenario_selection_interface_spec.md
    - path: knowledge/_shared/sources/policies/progressive_overload_policy.md
    - path: knowledge/_shared/sources/specs/traceability_spec.md
    - path: knowledge/_shared/sources/specs/file_naming_spec.md
    - path: knowledge/_shared/sources/specs/mandatory_output_season_scenarios.md
    - path: knowledge/_shared/sources/schemas/bundled/season_scenarios.schema.json
    - path: knowledge/_shared/sources/schemas/bundled/season_scenario_selection.schema.json
    - path: knowledge/_shared/sources/schemas/bundled/artefact_meta.schema.json
    - path: knowledge/_shared/sources/schemas/bundled/artefact_envelope.schema.json
    modes:
      scenario:
        bundle_id: season_scenario
    bundles:
    - id: season_scenario
      inject:
  coach:
    inject:
    - path: knowledge/_shared/sources/specs/load_estimation_spec.md
    - path: knowledge/_shared/sources/principles/principles_durability_first_cycling.md
    - path: knowledge/_shared/sources/evidence/durability_bibliography.md
    - path: knowledge/_shared/sources/policies/progressive_overload_policy.md
