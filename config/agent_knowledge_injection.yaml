# Knowledge injection model:
# - `inject`: always injected for the agent (base bundle).
# - `modes.<mode>.bundle_id`: selects ONE bundle for the current run mode.
# - `bundles[].inject`: injected IN ADDITION to the base bundle.
#   Result = base `inject` + selected bundle `inject`.
agents:
  season_planner:
    inject:
    - path: specs/knowledge/_shared/sources/specs/load_estimation_spec.md
      label: LoadEstimationSpec
      section: season
    - path: specs/knowledge/_shared/sources/principles/principles_durability_first_cycling.md
    - path: specs/knowledge/_shared/sources/evidence/durability_bibliography.md
    - path: specs/knowledge/_shared/sources/policies/progressive_overload_policy.md
    - path: specs/knowledge/_shared/sources/contracts/season__phase_contract.md
    - path: specs/knowledge/_shared/sources/contracts/data_pipeline__season_contract.md
    - path: specs/knowledge/_shared/sources/contracts/scenario__season_contract.md
    - path: specs/knowledge/_shared/sources/specs/athlete_profile_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/planning_events_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/logistics_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/availability_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/wellness_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/season_scenarios_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/season_scenario_selection_interface_spec.md
    - path: specs/knowledge/_shared/sources/specs/season_cycle_enum_spec.md
    - path: specs/knowledge/_shared/sources/specs/agenda_enum_spec.md
    - path: specs/knowledge/_shared/sources/specs/traceability_spec.md
    - path: specs/knowledge/_shared/sources/specs/file_naming_spec.md
    - path: specs/knowledge/_shared/sources/schemas/bundled/artefact_meta.schema.json
    - path: specs/knowledge/_shared/sources/schemas/bundled/artefact_envelope.schema.json
    modes:
      season_plan:
        bundle_id: season_plan
      feed_forward:
        bundle_id: season_feed_forward
      scenario:
        bundle_id: season_scenario
    bundles:
    - id: season_plan
      inject:
      - path: specs/knowledge/_shared/sources/specs/mandatory_output_season_plan.md
      - path: specs/knowledge/_shared/sources/schemas/bundled/season_plan.schema.json
    - id: season_feed_forward
      inject:
      - path: specs/knowledge/_shared/sources/specs/load_estimation_spec.md
        label: LoadEstimationSpec
        section: season
      - path: specs/knowledge/_shared/sources/specs/mandatory_output_season_phase_feed_forward.md
      - path: specs/knowledge/_shared/sources/schemas/bundled/season_phase_feed_forward.schema.json
    - id: season_scenario
      inject:
      - path: specs/knowledge/_shared/sources/contracts/scenario__season_contract.md
      - path: specs/knowledge/_shared/sources/specs/season_scenarios_interface_spec.md
      - path: specs/knowledge/_shared/sources/specs/season_scenario_selection_interface_spec.md
  season_scenario:
    inject:
