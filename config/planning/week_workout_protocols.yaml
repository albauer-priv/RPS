selection_policy:
  by_phase_intent:
    shortened_re_entry:
      QUALITY: [TEMPO_CLASSIC_INTERVALS, SWEET_SPOT_CLASSIC_INTERVALS, K3_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    general_base:
      QUALITY: [TEMPO_CLASSIC_INTERVALS, SWEET_SPOT_CLASSIC_INTERVALS, K3_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    aerobic_base:
      QUALITY: [TEMPO_CLASSIC_INTERVALS, SWEET_SPOT_CLASSIC_INTERVALS, K3_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    strength_endurance_base:
      QUALITY: [K3_CLASSIC_INTERVALS, TEMPO_CLASSIC_INTERVALS, SWEET_SPOT_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    sweet_spot_base:
      QUALITY: [SWEET_SPOT_CLASSIC_INTERVALS, TEMPO_CLASSIC_INTERVALS, K3_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    specificity_build:
      QUALITY: [TEMPO_STEADY_BREVET, TEMPO_CLASSIC_INTERVALS, TEMPO_OVER_UNDER, SWEET_SPOT_EXTENSIVE, SWEET_SPOT_CLASSIC_INTERVALS, THRESHOLD_CLASSIC_INTERVALS, VO2_LONG_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_FATIGUE_FINISH, ENDURANCE_PREFATIGUE_FINISH, ENDURANCE_LONG_STEADY, ENDURANCE_STEADY]
    durability_build:
      QUALITY: [TEMPO_STEADY_BREVET, SWEET_SPOT_EXTENSIVE, TEMPO_CLASSIC_INTERVALS, SWEET_SPOT_CLASSIC_INTERVALS, K3_CLASSIC_INTERVALS, TEMPO_OVER_UNDER]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_FATIGUE_FINISH, ENDURANCE_PREFATIGUE_FINISH, ENDURANCE_LONG_STEADY, ENDURANCE_STEADY]
    sst_build:
      QUALITY: [SWEET_SPOT_EXTENSIVE, SWEET_SPOT_CLASSIC_INTERVALS, TEMPO_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    threshold_build:
      QUALITY: [THRESHOLD_CLASSIC_INTERVALS, TEMPO_OVER_UNDER, TEMPO_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    peak_sharpening:
      QUALITY: [TEMPO_STEADY_BREVET, TEMPO_CLASSIC_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_LONG_STEADY, ENDURANCE_STEADY]
    taper_freshening:
      QUALITY: [TEMPO_STEADY_BREVET]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    race_execution:
      QUALITY: [TEMPO_STEADY_BREVET]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    vo2_build:
      QUALITY: [VO2_MICROBURST_20_10, VO2_MICROBURST_30_15, VO2_MICROBURST_40_20, VO2_LONG_INTERVALS]
      RECOVERY: [ENDURANCE_LOW_STEADY]
      ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
  by_day_role:
    QUALITY: [TEMPO_CLASSIC_INTERVALS, SWEET_SPOT_CLASSIC_INTERVALS, K3_CLASSIC_INTERVALS, TEMPO_OVER_UNDER, THRESHOLD_CLASSIC_INTERVALS]
    RECOVERY: [ENDURANCE_LOW_STEADY]
    ENDURANCE: [ENDURANCE_STEADY, ENDURANCE_LONG_STEADY]
    OPTIONAL: [ENDURANCE_LOW_STEADY, ENDURANCE_STEADY]
