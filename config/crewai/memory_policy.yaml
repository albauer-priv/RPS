default_embedder:
  provider: openai
  config:
    model_name: text-embedding-3-small

default_llm: null

crews:
  coach_conversation:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/coach/shared
    storage_template: runtime/athletes/{athlete_id}/memory/coach
  workout_editor_conversation:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/workout_editor/shared
    storage_template: runtime/athletes/{athlete_id}/memory/workout_editor
  season_planning:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/planning/season/nonbinding
    storage_template: runtime/athletes/{athlete_id}/memory/planning_season
  phase_planning:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/planning/phase/nonbinding
    storage_template: runtime/athletes/{athlete_id}/memory/planning_phase
  week_planning:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/planning/week/nonbinding
    storage_template: runtime/athletes/{athlete_id}/memory/planning_week
  report_advisory:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/advisory/report
    storage_template: runtime/athletes/{athlete_id}/memory/report
  feed_forward_advisory:
    enabled: true
    shared_scope_template: /athlete/{athlete_id}/advisory/feed_forward
    storage_template: runtime/athletes/{athlete_id}/memory/feed_forward

agents:
  conversation_manager:
    scope_template: /athlete/{athlete_id}/coach/session/{surface}
    mode: scope
  week_context_specialist:
    scope_template: /athlete/{athlete_id}/coach/session/{surface}/context
    mode: scope
  week_recommendation_specialist:
    scope_template: /athlete/{athlete_id}/coach/preferences
    additional_read_scopes:
      - /athlete/{athlete_id}/coach/accepted_patterns
    mode: slice_read_only
  week_revision_specialist:
    scope_template: /athlete/{athlete_id}/coach/accepted_patterns
    mode: scope
  pending_resolution_specialist:
    scope_template: /athlete/{athlete_id}/coach/session/{surface}/pending
    mode: scope
  season_plan_manager:
    scope_template: /athlete/{athlete_id}/planning/season/nonbinding/manager
    mode: scope
  season_feed_forward_manager:
    scope_template: /athlete/{athlete_id}/advisory/feed_forward/season_manager
    mode: scope
  phase_bundle_manager:
    scope_template: /athlete/{athlete_id}/planning/phase/nonbinding/manager
    mode: scope
  phase_feed_forward_manager:
    scope_template: /athlete/{athlete_id}/advisory/feed_forward/phase_manager
    mode: scope
  week_artifact_writer:
    scope_template: /athlete/{athlete_id}/planning/week/nonbinding/writer
    mode: scope
  performance_analysis_specialist:
    scope_template: /athlete/{athlete_id}/advisory/report/analyst
    mode: scope
