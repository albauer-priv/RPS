defaults:
  internal_reasoning:
    output_mode: pydantic
    guardrails:
      - typed_output_present
    guardrail_max_retries: 2
  operation:
    output_mode: pydantic
    guardrails:
      - typed_output_present
    guardrail_max_retries: 2
  persisted_artifact:
    output_mode: json
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
    guardrail_max_retries: 2

tasks:
  finalize_reply:
    guardrails:
      - typed_output_present
      - coaching_recommendation_text_present
  form_adjustment_intent:
    guardrails:
      - typed_output_present
      - adjustment_intent_has_preview_message
  create_week_preview:
    guardrails:
      - typed_output_present
      - coach_preview_summary_complete
  resolve_pending_operation:
    guardrails:
      - typed_output_present
      - pending_resolution_summary_present
  season_plan_finalize:
    # constraints[]/load_governance[]/phase_blueprints are no longer produced by the
    # manager LLM (assembled deterministically post-kickoff from sibling task outputs;
    # see _assemble_season_plan_draft_bundle). season_bundle_integrity,
    # season_bundle_audit_slot_integrity, season_phase_load_feasibility, and
    # season_bundle_review_readiness all depend on those fields, so they can no longer
    # run as CrewAI guardrails against this task's narrower raw output; they run as
    # plain post-assembly checks in _run_season_plan_document instead.
    output_mode: pydantic
    guardrails:
      - typed_output_present
    guardrail_max_retries: 2
  season_plan_audit:
    guardrails:
      - typed_output_present
      - audit_lists_are_lists
  season_governance_review:
    guardrails:
      - typed_output_present
      - audit_lists_are_lists
  season_constraints_review:
    guardrails:
      - typed_output_present
      - audit_lists_are_lists
  season_review:
    output_mode: pydantic
    guardrails:
      - typed_output_present
      - review_decision_integrity
    guardrail_max_retries: 2
  season_scenario_selection:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - season_scenario_selection_shape
  season_scenarios:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - season_scenarios_selection_contract_complete
      - season_scenarios_profile_quality
  season_plan:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - season_writer_bundle_match
      - season_phase_coverage_and_cadence
      - season_phase_load_context_match
      - season_cycle_ordering
  phase_constraint_audit:
    guardrails:
      - typed_output_present
      - audit_lists_are_lists
  phase_governance_review:
    guardrails:
      - typed_output_present
      - audit_lists_are_lists
  phase_bundle_finalize:
    # guardrails/structure/preview payloads are no longer produced by the manager LLM
    # (assembled deterministically post-kickoff from sibling task outputs; see
    # _assemble_phase_draft_bundle). phase_bundle_integrity and phase_bundle_review_readiness
    # both depend on those fields (or on cross-checking them against phase_intent), so they
    # can no longer run as CrewAI guardrails against this task's narrower raw output; they
    # run as plain post-assembly checks in _run_phase_bundle_document instead.
    # phase_week_role_load_coherence only needs week_blueprints, which stays LLM-authored,
    # so it's unaffected and stays here.
    output_mode: pydantic
    guardrails:
      - typed_output_present
      - phase_week_role_load_coherence
    guardrail_max_retries: 2
  phase_review:
    output_mode: pydantic
    guardrails:
      - typed_output_present
      - review_decision_integrity
    guardrail_max_retries: 2
  phase_guardrails:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - phase_s5_band_match
  phase_structure:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - phase_weeks_match_range
      - phase_execution_context_match
      - phase_week_role_load_coherence
  week_plan_finalize:
    output_mode: pydantic
    guardrails:
      - typed_output_present
      - week_bundle_integrity
      - week_bundle_matches_context
      - week_bundle_domain_legality_check
      - week_bundle_review_readiness
    guardrail_max_retries: 2
  week_review:
    output_mode: pydantic
    guardrails:
      - typed_output_present
      - review_decision_integrity
    guardrail_max_retries: 2
  week_plan:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - week_corridor_and_capacity_check
      - week_active_corridor_match
      - week_recovery_day_load_check
      - week_agenda_shape_and_calendar_check
      - week_daily_availability_check
      - week_phase_role_alignment_check
      - week_contract_context_match
      - week_workout_structure_policy_check
      - week_exportability_check
  report_review:
    output_mode: pydantic
    guardrails:
      - typed_output_present
      - review_decision_integrity
    guardrail_max_retries: 2
  des_analysis_report:
    guardrails:
      - artifact_envelope_basic
      - artifact_meta_data_present
      - artifact_schema_valid
      - des_diagnostic_only
