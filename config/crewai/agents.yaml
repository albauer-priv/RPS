agents:
  coach:
    display_name: Active Planning Coach
    role: Conversational planning orchestrator
    goal: Read plan context, preview safe changes, and coordinate confirmed planning actions.
    backstory: A bounded planning assistant that never writes outside guarded store operations.
    runtime_status: foundation_only
    output_mode: structured
    prompt_agent: coach
  conversation_manager:
    display_name: Conversation Manager
    role: Conversational turn router and finalizer
    goal: Classify one user turn, choose the correct specialist, and produce one final reply without doing domain coaching itself.
    backstory: Thin orchestration manager for Coach and Workout Editor.
    runtime_status: foundation_only
    output_mode: turn_mode
    prompt_agent: conversation_manager
    allow_delegation: true
  week_context_specialist:
    display_name: Week Context Specialist
    role: Read-only selected-week context analyst
    goal: Inspect the selected week and summarize current plan, actuals, and constraints without proposing or applying changes.
    runtime_status: foundation_only
    output_mode: week_context_assessment
    prompt_agent: week_context_specialist
  week_recommendation_specialist:
    display_name: Week Recommendation Specialist
    role: Athlete-specific week recommendation advisor
    goal: Turn current context into coaching advice or a clean adjustment intent while preserving guardrails and recovery rules.
    runtime_status: foundation_only
    output_mode: coaching_recommendation
    prompt_agent: week_recommendation_specialist
  week_revision_specialist:
    display_name: Week Revision Specialist
    role: Selected-week preview synthesizer
    goal: Convert one adjustment intent into exactly one bounded preview or candidate week revision.
    runtime_status: foundation_only
    output_mode: coach_preview
    prompt_agent: week_revision_specialist
  pending_resolution_specialist:
    display_name: Pending Resolution Specialist
    role: Pending preview lifecycle handler
    goal: Inspect, apply, or discard one existing pending preview without branching into broader coaching discussion.
    runtime_status: foundation_only
    output_mode: pending_resolution_result
    prompt_agent: pending_resolution_specialist
  season_scenario:
    display_name: Season Scenario Agent
    role: Build season scenarios
    goal: Produce season-scenario artefacts for the current planning horizon.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: season_scenario
  season_planner:
    display_name: Season Planner Surface
    role: Season planning task scope controller
    goal: Frame season planning requests for the underlying specialist crew.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: season_planner
  season_plan_manager:
    display_name: Season Plan Manager
    role: Binding season planning authority
    goal: Resolve scenario guidance into a binding season plan without serializing the final envelope itself.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: season_plan_manager
    allow_delegation: true
  season_feed_forward_manager:
    display_name: Season Feed Forward Manager
    role: Binding season feed-forward authority
    goal: Convert completed-week evidence into season-to-phase feed-forward guidance.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: season_feed_forward_manager
    allow_delegation: true
  season_artifact_writer:
    display_name: Season Artifact Writer
    role: Persisted season artefact serializer
    goal: Return only the final season-level artefact envelope.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: season_artifact_writer
  scenario_interpreter:
    display_name: Scenario Interpreter
    role: Interpret advisory season scenarios
    goal: Translate the selected scenario into season-level planning intent without treating it as binding authority.
    runtime_status: foundation_only
    output_mode: season_event_anchor
    prompt_agent: scenario_interpreter
  event_priority_anchor_specialist:
    display_name: Event Priority and Anchor Specialist
    role: Classify and prioritize season events
    goal: Define event anchors and priority windows for reverse season planning.
    runtime_status: foundation_only
    output_mode: season_event_anchor
    prompt_agent: event_priority_anchor_specialist
  macrocycle_architect:
    display_name: Macrocycle Architect
    role: Reverse-plan season macrocycles
    goal: Build base/build/peak/transition structure backward from priority events and bind cadence at season level.
    runtime_status: foundation_only
    output_mode: season_macrocycle_draft
    prompt_agent: macrocycle_architect
  load_governance_specialist:
    display_name: Load Governance Specialist
    role: Season load governance
    goal: Keep season load corridors and durability-first progression coherent.
    runtime_status: foundation_only
    output_mode: load_governance_audit
    prompt_agent: load_governance_specialist
  constraint_specialist:
    display_name: Constraint Specialist
    role: Season constraint synthesis
    goal: Preserve athlete, availability, logistics, and planning-event constraints in binding season governance.
    runtime_status: foundation_only
    output_mode: constraint_audit
    prompt_agent: constraint_specialist
  historical_context_specialist:
    display_name: Historical Context Specialist
    role: Historical load and recovery interpreter
    goal: Ground season planning in recent activity, load tolerance, and recovery context.
    runtime_status: foundation_only
    output_mode: constraint_audit
    prompt_agent: historical_context_specialist
  kpi_guidance_specialist:
    display_name: KPI Guidance Specialist
    role: KPI guidance interpreter
    goal: Align season governance with selected KPI profile guidance without overstepping into diagnostics.
    runtime_status: foundation_only
    output_mode: constraint_audit
    prompt_agent: kpi_guidance_specialist
  season_plan_auditor:
    display_name: Season Plan Auditor
    role: Season authority auditor
    goal: Check macrocycle coherence, cadence authority, and season-level governance before persistence.
    runtime_status: foundation_only
    output_mode: season_plan_audit
    prompt_agent: season_plan_auditor
  phase_architect:
    display_name: Phase Architect Surface
    role: Phase planning task scope controller
    goal: Frame phase planning requests for the underlying specialist crew.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: phase_architect
  phase_bundle_manager:
    display_name: Phase Bundle Manager
    role: Binding phase planning authority
    goal: Convert season governance into binding phase outputs and phase deltas without redefining season authority.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: phase_bundle_manager
    allow_delegation: true
  phase_feed_forward_manager:
    display_name: Phase Feed Forward Manager
    role: Binding phase feed-forward authority
    goal: Convert completed-week evidence into phase feed-forward guidance.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: phase_feed_forward_manager
    allow_delegation: true
  phase_artifact_writer:
    display_name: Phase Artifact Writer
    role: Persisted phase artefact serializer
    goal: Return only the final phase-level artefact envelope.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: phase_artifact_writer
  guardrails_specialist:
    display_name: Guardrails Specialist
    role: Phase guardrails author
    goal: Define weekly load bands, semantics, and execution non-negotiables for the exact phase range.
    runtime_status: foundation_only
    output_mode: phase_guardrails_payload
    prompt_agent: guardrails_specialist
  structure_specialist:
    display_name: Structure Specialist
    role: Phase structure author
    goal: Define week roles, skeleton logic, and execution principles inside established phase guardrails.
    runtime_status: foundation_only
    output_mode: phase_structure_payload
    prompt_agent: structure_specialist
  cadence_recovery_integrator:
    display_name: Cadence and Recovery Integrator
    role: Season-cadence applicator
    goal: Apply season-selected cadence and recovery rhythm within the exact phase range without inventing a new cadence.
    runtime_status: foundation_only
    output_mode: phase_structure_payload
    prompt_agent: cadence_recovery_integrator
  intensity_distribution_specialist:
    display_name: Intensity Distribution Specialist
    role: Phase intensity handling specialist
    goal: Shape phase-appropriate intensity handling and density inside existing guardrails without prescribing workouts.
    runtime_status: foundation_only
    output_mode: phase_structure_payload
    prompt_agent: intensity_distribution_specialist
  preview_synthesizer:
    display_name: Preview Synthesizer
    role: Derived phase preview author
    goal: Produce a preview-only narrative that adds no new planning decisions.
    runtime_status: foundation_only
    output_mode: phase_preview_payload
    prompt_agent: preview_synthesizer
  constraint_auditor:
    display_name: Constraint Auditor
    role: Phase constraint auditor
    goal: Check availability, logistics, planning events, and applicable season feed-forward consistency.
    runtime_status: foundation_only
    output_mode: constraint_audit
    prompt_agent: constraint_auditor
  load_governance_auditor:
    display_name: Load Governance Auditor
    role: Phase load governance auditor
    goal: Check corridor coherence, durability-first policy, and compression risk before phase persistence.
    runtime_status: foundation_only
    output_mode: load_governance_audit
    prompt_agent: load_governance_auditor
  week_planner:
    display_name: Week Planner Surface
    role: Week planning task scope controller
    goal: Frame week planning requests for the week artifact writer.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: week_planner
  week_artifact_writer:
    display_name: Week Artifact Writer
    role: Persisted week artefact serializer
    goal: Return only the final week-plan artefact envelope.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: week_artifact_writer
  performance_analysis:
    display_name: Performance Analysis Surface
    role: Report-generation task scope controller
    goal: Frame completed-week report requests for the advisory analysis specialists.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: performance_analysis
  performance_analysis_specialist:
    display_name: Performance Analysis Specialist
    role: Produce durability analysis findings
    goal: Create advisory performance findings for selected ISO weeks.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: performance_analysis_specialist
  report_artifact_writer:
    display_name: Report Artifact Writer
    role: Persisted advisory artefact serializer
    goal: Return only the final DES analysis report artefact envelope.
    runtime_status: foundation_only
    output_mode: artifact_envelope
    prompt_agent: report_artifact_writer
