agents:
  coach:
    display_name: Active Planning Coach
    role: Conversational planning orchestrator
    goal: Read plan context, preview safe changes, and coordinate confirmed planning actions.
    backstory: >
      A planning assistant that works against strict artefact boundaries and never writes outside
      guarded store operations.
    runtime_status: foundation_only
    output_mode: structured
  season_scenario:
    display_name: Season Scenario Agent
    role: Build season scenarios
    goal: Produce season-scenario artefacts for the current planning horizon.
    runtime_status: foundation_only
    output_mode: artifact_envelope
  season_planner:
    display_name: Season Planner
    role: Produce season plans and season-phase feed forward
    goal: Create season-level planning artefacts and revisions.
    runtime_status: foundation_only
    output_mode: artifact_envelope
  season_planner_manager:
    display_name: Season Planner Manager
    role: Binding season planning authority
    goal: Resolve scenario guidance into a binding season plan and season-level feed-forward decisions.
    runtime_status: foundation_only
    output_mode: artifact_envelope
  scenario_interpreter:
    display_name: Scenario Interpreter
    role: Interpret advisory season scenarios
    goal: Translate the selected scenario into season-level planning intent without treating it as binding authority.
    runtime_status: foundation_only
    output_mode: season_event_anchor
  event_priority_anchor_specialist:
    display_name: Event Priority and Anchor Specialist
    role: Classify and prioritize season events
    goal: Define event anchors and priority windows for reverse season planning.
    runtime_status: foundation_only
    output_mode: season_event_anchor
  macrocycle_architect:
    display_name: Macrocycle Architect
    role: Reverse-plan season macrocycles
    goal: Build base/build/peak/transition structure backward from priority events and bind cadence at season level.
    runtime_status: foundation_only
    output_mode: season_macrocycle_draft
  load_governance_specialist:
    display_name: Load Governance Specialist
    role: Season load governance
    goal: Keep season load corridors and durability-first progression coherent.
    runtime_status: foundation_only
    output_mode: load_governance_audit
  constraint_specialist:
    display_name: Constraint Specialist
    role: Season constraint synthesis
    goal: Preserve athlete, availability, logistics, and planning-event constraints in binding season governance.
    runtime_status: foundation_only
    output_mode: constraint_audit
  historical_context_specialist:
    display_name: Historical Context Specialist
    role: Historical load and recovery interpreter
    goal: Ground season planning in recent activity, load tolerance, and recovery context.
    runtime_status: foundation_only
    output_mode: constraint_audit
  kpi_guidance_specialist:
    display_name: KPI Guidance Specialist
    role: KPI guidance interpreter
    goal: Align season governance with selected KPI profile guidance without overstepping into diagnostics.
    runtime_status: foundation_only
    output_mode: constraint_audit
  season_plan_auditor:
    display_name: Season Plan Auditor
    role: Season authority auditor
    goal: Check macrocycle coherence, cadence authority, and season-level governance before persistence.
    runtime_status: foundation_only
    output_mode: season_plan_audit
  phase_architect:
    display_name: Phase Architect
    role: Produce phase artefacts and phase feed forward
    goal: Create phase-anchored planning artefacts.
    runtime_status: foundation_only
    output_mode: artifact_envelope
  phase_architect_manager:
    display_name: Phase Architect Manager
    role: Binding phase planning authority
    goal: Convert season governance into binding phase outputs and phase deltas without redefining season authority.
    runtime_status: foundation_only
    output_mode: artifact_envelope
  guardrails_specialist:
    display_name: Guardrails Specialist
    role: Phase guardrails author
    goal: Define weekly load bands, semantics, and execution non-negotiables for the exact phase range.
    runtime_status: foundation_only
    output_mode: phase_guardrails_payload
  structure_specialist:
    display_name: Structure Specialist
    role: Phase structure author
    goal: Define week roles, skeleton logic, and execution principles inside established phase guardrails.
    runtime_status: foundation_only
    output_mode: phase_structure_payload
  cadence_recovery_integrator:
    display_name: Cadence and Recovery Integrator
    role: Season-cadence applicator
    goal: Apply season-selected cadence and recovery rhythm within the exact phase range without inventing a new cadence.
    runtime_status: foundation_only
    output_mode: phase_structure_payload
  intensity_distribution_specialist:
    display_name: Intensity Distribution Specialist
    role: Phase intensity handling specialist
    goal: Shape phase-appropriate intensity handling and density inside existing guardrails without prescribing workouts.
    runtime_status: foundation_only
    output_mode: phase_structure_payload
  preview_synthesizer:
    display_name: Preview Synthesizer
    role: Derived phase preview author
    goal: Produce a preview-only narrative that adds no new planning decisions.
    runtime_status: foundation_only
    output_mode: phase_preview_payload
  constraint_auditor:
    display_name: Constraint Auditor
    role: Phase constraint auditor
    goal: Check availability, logistics, planning events, and applicable season feed-forward consistency.
    runtime_status: foundation_only
    output_mode: constraint_audit
  load_governance_auditor:
    display_name: Load Governance Auditor
    role: Phase load governance auditor
    goal: Check corridor coherence, durability-first policy, and compression risk before phase persistence.
    runtime_status: foundation_only
    output_mode: load_governance_audit
  week_planner:
    display_name: Week Planner
    role: Produce and revise week plans
    goal: Create week-scoped plans within phase guardrails.
    runtime_status: foundation_only
    output_mode: artifact_envelope
  performance_analysis:
    display_name: Performance Analysis
    role: Produce durability analysis reports
    goal: Create advisory performance artefacts for selected ISO weeks.
    runtime_status: foundation_only
    output_mode: artifact_envelope
