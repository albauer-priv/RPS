tasks:
  classify_turn:
    agent: conversation_manager
    kind: internal_reasoning
    output: turn_mode
    description: Classify one conversational turn into analyze, recommend, create_preview, or resolve_pending.
    expected_output: A structured turn mode with a short routing rationale.
  finalize_reply:
    agent: conversation_manager
    kind: internal_reasoning
    output: coaching_recommendation
    description: Produce the final user-facing reply from one specialist result without changing the specialist decision.
    expected_output: A structured final-reply wrapper whose recommendation field contains the final assistant reply.
  analyze_week_context:
    agent: week_context_specialist
    kind: internal_reasoning
    output: week_context_assessment
    tools: read_only_workspace
    description: Inspect the current selected week and summarize plan, actuals, constraints, and likely change direction.
    expected_output: A structured selected-week context assessment.
  form_coaching_recommendation:
    agent: week_recommendation_specialist
    kind: internal_reasoning
    output: coaching_recommendation
    description: Turn a week-context assessment into direct coaching guidance for an advisory-only turn.
    expected_output: A structured coaching recommendation.
  form_adjustment_intent:
    agent: week_recommendation_specialist
    kind: internal_reasoning
    output: adjustment_intent
    description: Turn a week-context assessment and user request into one clean adjustment intent for preview creation.
    expected_output: A structured adjustment intent suitable for one preview operation.
  create_week_preview:
    agent: week_revision_specialist
    kind: operation
    output: coach_preview_summary
    description: Create exactly one bounded selected-week preview from a structured adjustment intent.
    expected_output: A structured coach preview result for the selected week.
  resolve_pending_operation:
    agent: pending_resolution_specialist
    kind: operation
    output: pending_resolution_result
    description: Inspect, apply, or discard the existing pending preview operation for the current chat surface.
    expected_output: A structured pending-resolution result.
  coach_read_context:
    agent: coach
    kind: operation
    output: coach_preview
    tools: read_only_workspace
    description: Read the selected-week plan context and summarize the current actionable state.
    expected_output: A structured preview-style context summary for the active coach.
  coach_preview_artifact_edit:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview a bounded selected-week artifact edit before any persistence occurs.
    expected_output: A structured preview object including affected artifacts and confirmation requirement.
  coach_apply_artifact_edit:
    agent: coach
    kind: operation
    output: coach_apply
    description: Apply the currently confirmed bounded artifact edit through guarded store operations.
    expected_output: A structured apply result describing stored artifacts and any rebuilds.
  coach_preview_scoped_replan:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview a scoped selected-week replan based on a user instruction.
    expected_output: A structured preview object for the scoped replan.
  coach_apply_scoped_replan:
    agent: coach
    kind: operation
    output: coach_apply
    description: Apply a confirmed scoped selected-week replan and rebuild downstream deterministic artifacts.
    expected_output: A structured apply result for the scoped replan.
  coach_preview_report:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview DES analysis report generation for the selected ISO week.
    expected_output: A structured preview object for report generation.
  coach_apply_report:
    agent: coach
    kind: operation
    output: coach_apply
    description: Run confirmed DES analysis report generation for the selected ISO week.
    expected_output: A structured apply result for report generation.
  coach_preview_feed_forward:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview the report and feed-forward chain for the selected ISO week.
    expected_output: A structured preview object for the advisory chain.
  coach_apply_feed_forward:
    agent: coach
    kind: operation
    output: coach_apply
    description: Run the confirmed report and feed-forward chain for the selected ISO week.
    expected_output: A structured apply result for the advisory chain.
  evidence_curate_source:
    agent: evidence_curation_specialist
    kind: internal_reasoning
    output: evidence_curation
    description: Curate one verified evidence source package into an RPS-specific structured brief. Judge relevance through RPS goals, preserve authority boundaries, distinguish what the source supports from what it does not justify, and summarize only from the provided source material basis. Discovery tags are not evidence. For `metadata_only`, keep `important_findings` limited to negative-capability statements about missing extractable findings, methods, or results; do not mirror routing tags or title paraphrases as if they were empirical findings. Off-domain metadata-only sources should normally be `reject` or tightly bounded `background_only`. For `abstract_only`, keep findings and implications explicitly abstract-bounded, avoid direct imperative coaching language unless framed as abstract-supported guidance, and do not mix `background_only` with stronger allowed uses.
    expected_output: A fully populated structured evidence curation model.

  season_scenarios:
    agent: season_scenario
    kind: persisted_artifact
    output: artifact_envelope
    tools:
      - workspace_get_input
      - workspace_get_latest
    description: >-
      Recommendation-default cadence hard rule: deterministic recommendation
      cadence is advisory for one scenario, not the default cadence for all
      scenarios. A/B/C must not all mirror the recommendation-default cadence
      unless the stored scenario fields explicitly justify that cadence is
      intentionally shared. When cadence is intentionally shared, the stored
      scenario fields must explicitly say that differentiation instead comes
      from `load philosophy`, `specificity-under-fatigue`, `recovery margin`
      and/or `recovery tolerance`, `intensity permissions`, or `risk posture`.
      If that rationale cannot be stated explicitly in `decision_notes`,
      `risk_flags`, `event_alignment_notes`, and/or `kpi_guardrail_notes`, at
      least one scenario must use a different `deload_cadence`. Scenario C
      VO2MAX hard rule: Scenario C may include `VO2MAX` only when
      it is explicitly justified as `sparse ceiling-support`, `fresh-only`,
      `not primary identity`, and ambition sourced from
      `specificity-under-fatigue`, `density`, `event simulation`, or `load
      posture`. If that rationale cannot be stated explicitly in
      `decision_notes` and/or `kpi_guardrail_notes`, omit `VO2MAX` from
      Scenario C `allowed_domains`. Preferred copyable wording:
      `VO2MAX remains sparse ceiling-support only when fresh-only, not primary
      identity; the scenario ambition comes from specificity-under-fatigue,
      density, and event simulation.` Create the season-scenarios artifact
      envelope for the selected planning horizon. Only future / in-horizon
      events are provided to this task; do
      not infer active scenario logic from past, completed, or pre-horizon
      events. Differentiate A/B/C primarily by kJ-envelope,
      specificity-under-fatigue, density, recovery tolerance, cadence rhythm,
      and risk contract; treat intensity domains as permissions rather than the
      primary scenario identity. `scenario_guidance.deload_cadence` is not
      decorative phase math: it is part of each scenario's planning logic and
      must be explained in stored scenario fields (`decision_notes`,
      `risk_flags`, `event_alignment_notes`, and/or `kpi_guardrail_notes`).
      Scenario generation remains advisory, but it must emit a coherent cadence
      recommendation per scenario. The deterministic recommendation context may
      inform one scenario, but it must not be mirrored blindly into all
      scenarios. If multiple scenarios share the same `deload_cadence`,
      explicitly justify why cadence is intentionally held constant and why
      differentiation instead comes from load philosophy,
      specificity-under-fatigue, recovery margin, intensity permissions, and
      risk posture. Cluster wording requires multiple relevant in-horizon
      events; do not use `cluster`, `event cluster`, `B-event cluster`, or
      `peak cluster` language for a single future event. Do not emit A/B/C
      with the same `deload_cadence` unless that shared-cadence rationale is
      visible in the stored scenario fields. `allowed_domains` are an
      eligibility layer only; they do not authorize every domain in every
      phase. Carry those layer clarifications in top-level `data.notes`. Also
      make the scenarios easy to choose as user-facing options by
      providing `typical_week_feel`, `main_payoff`, `main_cost`,
      `what_gets_prioritized`, and `what_gets_de_emphasized`. `best_suited_if`
      must carry explicit positive selection conditions and `risk_flags` must
      carry explicit negative selection conditions. Write `best_suited_if` as
      a short concrete selection sentence, not generic praise or marketing
      prose. Use explicit positive markers such as `stable recovery`,
      `uncertain recovery`, `continuity priority`, `recoverability`,
      `load tolerance`, `fatigue exposure tolerance`, `travel`, `logistics`,
      `lower recovery margin`, or `recovery margin`. For Scenario A, make
      `best_suited_if` clearly say that `continuity priority`, `uncertain
      recovery`, `recoverability`, or `logistics robustness` are the reason to
      choose it. For Scenario B, make `best_suited_if` clearly say that
      `stable recovery` supports `systematic progression`. For Scenario C,
      make `best_suited_if` clearly say that `stable recovery`, `high load
      tolerance`, or `fatigue exposure tolerance` are already demonstrably
      present. Write `risk_flags` as
      short concrete caution sentences, not generic labels or soft marketing
      prose. Use explicit caution markers such as `under-deliver`,
      `continuity break`, `recovery slip`, `fatigue risk`,
      `travel disruption`, `logistics disruption`, `insufficient tolerance`,
      `too conservative`, or `too aggressive`. For Scenario A, make at least
      one `risk_flags` line clearly say the scenario may `under-deliver` or be
      `too conservative` if the athlete can tolerate more load. For Scenario
      B, make at least one `risk_flags` line clearly say the scenario becomes
      less forgiving if `continuity break` or `recovery slip` appears. For
      Scenario C, make at least one `risk_flags` line clearly say the scenario
      becomes `too aggressive` when `fatigue risk`, `travel disruption`,
      `logistics disruption`, or `insufficient tolerance` appears. Fill the
      remaining narrative fields with equally concrete scenario-specific
      content: `name` = short chooser label; `core_idea` = one-sentence
      scenario promise; `load_philosophy` = how load/recovery/specificity are
      balanced; `risk_profile` = relative risk and why; `key_differences` =
      explicit comparison against the other two scenarios; `typical_week_feel`
      = how a representative week feels; `main_payoff` and `main_cost` = main
      gain and tradeoff; `what_gets_prioritized` /
      `what_gets_de_emphasized` = short emphasis phrases;
      `event_alignment_notes` = future-only active event logic;
      `constraint_summary` = binding practical constraints;
      `kpi_guardrail_notes` = pacing/efficiency/metabolic guardrails;
      `decision_notes` = why this cadence and posture were chosen;
      `assumptions` = what must remain true; `unknowns` = what could change
      scenario choice later; `data.notes` = global layer clarifications such
      as future-only event logic and eligibility-not-authorization. The active
      scenario-generation layer is the front-loaded, self-contained source of
      operational posture for scenario selection: emit
      `scenario_guidance.recovery_margin`,
      `scenario_guidance.fatigue_exposure`, and
      `scenario_guidance.specificity_density` directly as non-empty strings,
      and keep `constraint_summary`, `event_alignment_notes`, `risk_flags`,
      `kpi_guardrail_notes`, and `decision_notes` as structured string arrays.
      Do not expect Selection, Season planning, review, writer, or renderer to
      infer those fields from narrative prose. Emit normalized
      `scenario_guidance.season_archetype` (`none` or
      `ceiling_first_durability`) plus `season_archetype_rationale`; default
      to `none` and use `ceiling_first_durability` only when the scenario
      clearly supports optional early ceiling work, enough runway, preserved
      later durability/specificity work, and recovery tolerance. Objective
      mismatch may be named as unresolved input context only; do not resolve it
      here.
    expected_output: Schema-compliant artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.
  season_scenario_selection:
    agent: season_scenario
    kind: persisted_artifact
    output: artifact_envelope
    tools: read_only_workspace
    description: Create the season-scenario-selection artifact envelope from the selected scenario and KPI guidance choice.
    expected_output: Schema-compliant SEASON_SCENARIO_SELECTION artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.
  season_context_read:
    agent: season_context_specialist
    kind: internal_reasoning
    output: planning_draft
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
    description: "Summarize season planning context, selected scenario state, and upstream inputs. Tool usage: use `workspace_get_input` for athlete-managed inputs (`planning_events`, `athlete_profile`, `availability`, `logistics`); use `workspace_get_latest` for latest authoritative planning artefacts and snapshots; use `workspace_get_version` only for explicit week-sensitive historical artefacts."
    expected_output: A structured planning draft for season context.
  season_scenario_interpretation:
    agent: scenario_interpreter
    kind: internal_reasoning
    output: season_event_anchor
    description: Interpret the selected scenario as advisory season intent.
    expected_output: A structured season scenario interpretation.
  season_event_priority_review:
    agent: event_priority_specialist
    kind: internal_reasoning
    output: season_event_anchor
    description: "Define A/B/C priority handling and event anchors for season planning. Tool usage: use `workspace_get_input` for `planning_events`; use `workspace_get_latest` for `SEASON_SCENARIOS`, `SEASON_SCENARIO_SELECTION`, and `ATHLETE_STATE_SNAPSHOT`; use `workspace_get_version` only when a week-sensitive historical artefact is explicitly required."
    expected_output: A structured event-priority draft.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
  season_peak_window_review:
    agent: peak_window_specialist
    kind: internal_reasoning
    output: planning_draft
    description: "Define peak window and taper-window logic for the season plan. Tool usage: use `workspace_get_input` for `planning_events`; use `workspace_get_latest` for selected-scenario and snapshot context; use `workspace_get_version` only for explicit week-sensitive historical artefacts."
    expected_output: A structured planning draft for peak-window logic.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
  season_macrocycle_draft:
    agent: macrocycle_architect
    kind: internal_reasoning
    output: season_macrocycle_draft
    context:
      - season_evidence_alignment
    description: "Reverse-plan macrocycle structure from one or more priority A-event anchors. Apply this order explicitly: exact deterministic authority first, then resolved previous-week evidence, then evidence-alignment implications, then macrocycle synthesis. Consume the `season_evidence_alignment` output actively as advisory shaping input for continuity, conservatism, and overreach prevention; it must shape the first real macrocycle draft but must not rewrite authority. A season may contain multiple target macrocycles when spacing supports recovery, re-entry, build, and taper; tightly spaced A-events must be modeled as one A-event peak cluster instead of separate overlapping macrocycles. Tool usage: use `workspace_get_input` for `planning_events`; use `workspace_get_latest` for selected-scenario and snapshot context; use `workspace_get_phase_slot_contract` for deterministic phase-slot structure. Return the structured macrocycle draft directly; do not assume a workspace file-write step."
    expected_output: A structured macrocycle draft with reverse-planning notes, A-event relationship classification, and explicit peak-cluster vs separate-macrocycle decisions.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_phase_slot_contract
  season_constraint_review:
    agent: season_constraint_specialist
    kind: internal_reasoning
    output: constraint_audit
    description: "Summarize binding athlete, availability, logistics, and event constraints for season planning. Include fixed rest days, feasibility bounds, travel/work limitations, and binding event-timing constraints. Keep the result focused on hard and soft constraints only; do not turn KPI semantics, historical continuity, or progression philosophy into primary findings except to note that they cannot override a binding constraint. Treat planning events as the only source of A/B/C event truth. Report real event facts and real event implications only. When no event-specific constraint exists for a phase or window, say nothing about that event category rather than inventing placeholder findings such as 'No target-week event' or 'No event-driven load exception'. Tool usage: use `workspace_get_input` for athlete-managed inputs and `workspace_get_latest` for latest authoritative planning artefacts or snapshots."
    expected_output: A structured constraint audit for season planning.
    tools:
      - workspace_get_input
      - workspace_get_latest
  season_historical_context_review:
    agent: season_historical_context_specialist
    kind: internal_reasoning
    output: constraint_audit
    description: "Summarize historical load, recovery, and re-entry implications for the current season run. Focus on recent tolerance, disruption risk, and continuity evidence only. Do not restate fixed rest days, phase corridors, event taper handling, or KPI pacing semantics as primary findings unless needed only to explain the historical evidence boundary. Tool usage: use `workspace_get_version` for week-sensitive `ACTIVITIES_ACTUAL` and `ACTIVITIES_TREND`; use `workspace_get_latest` only for non-week-sensitive supporting artefacts."
    expected_output: A structured historical-context review.
    tools:
      - workspace_get_latest
      - workspace_get_version
  season_evidence_alignment:
    agent: season_evidence_alignment_specialist
    kind: internal_reasoning
    output: planning_draft
    context:
      - season_context_read
      - season_scenario_interpretation
      - season_historical_context_review
    description: "Convert historical baseline plus exact previous-week `ACTIVITIES_ACTUAL` and exact previous-week `ACTIVITIES_TREND` into early season-planning implications before synthesis. Use previous-week evidence only; never use target-week activity evidence and never substitute arbitrary latest history. The output is a compact planning interpretation only: continuity/disruption, load tolerance, durability/recovery caution, conservative-vs-aggressive posture implications, and prohibited overreach. Do not rewrite selected-scenario authority, cadence authority, legality, or deterministic season load context."
    expected_output: A structured season evidence-alignment draft with concise planning implications.
  season_kpi_guidance_review:
    agent: season_kpi_guidance_specialist
    kind: internal_reasoning
    output: constraint_audit
    description: "Summarize KPI-profile, moving-time-rate, and pacing-band guidance for season planning. Focus on KPI semantics only: selected KPI bands, moving-time vs elapsed-time interpretation, pacing guardrails, and explicit limits of KPI authority. Do not restate fixed rest days, availability bounds, phase corridors, load caps, event-anchor/taper handling, or historical continuity as primary findings unless needed only to explain why KPI guidance cannot override them. Keep the output centered on pacing/rate-band interpretation rather than general season conservatism. Tool usage: use `workspace_get_latest` for latest KPI and snapshot context; use `workspace_get_input` only for athlete-managed inputs when explicitly needed."
    expected_output: A structured KPI-guidance review.
    tools:
      - workspace_get_input
      - workspace_get_latest
  season_load_corridor_draft:
    agent: season_load_corridor_specialist
    kind: internal_reasoning
    output: load_governance_audit
    context:
      - season_evidence_alignment
    description: "Draft season corridor logic and load realism checks. Apply this order explicitly: exact deterministic authority first, then resolved previous-week evidence, then evidence-alignment implications, then season corridor synthesis. Consume the `season_evidence_alignment` output actively as advisory shaping input for conservatism, tolerance, and prohibited-overreach interpretation; it must shape the first real corridor draft but must not rewrite authority. Apply the full progressive overload policy, not just one cadence fragment: cadence-family selection, ramp class choice, deload magnitude, mini-reset semantics, reload vs re-entry distinction, fallback behavior, and conservative next-baseline logic must all be explicit. Preserve season-level intensity authority from the selected scenario; do not infer season semantics backward from a narrower Phase Guardrails example. Base/Re-entry into the first Build week must be readiness-gated and large jumps must be explained rather than accepted silently. Objective mismatch is input-owned: surface it only as warning/revisit context and never rewrite it here. Tool usage: prefer deterministic injected load context and `workspace_get_latest` snapshot/planning artefacts; use `workspace_get_version` only for explicit historical load references."
    expected_output: A structured season load-corridor draft.
    tools:
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_progression_review:
    agent: season_progression_specialist
    kind: internal_reasoning
    output: load_governance_audit
    context:
      - season_evidence_alignment
    description: "Draft season progression, cadence, overload, fallback, and phase-level domain-shaping guidance. Apply this order explicitly: exact deterministic authority first, then resolved previous-week evidence, then evidence-alignment implications, then season progression synthesis. Consume the `season_evidence_alignment` output actively as advisory shaping input for cadence ambition, fallback sensitivity, and overreach prevention; it must shape the first real progression draft but must not rewrite authority. Carry the full progressive overload policy forward: cadence selection criteria (`2:1`, `3:1`, `2:1:1`), ramp classes, deload and re-entry targets, repeated week-3 collapse fallback, `2:1` stall / unnecessary-deload interpretation, conservative baseline updates, and build-entry readiness gates must all be explicit. Durability-first means `ENDURANCE` dominant, not `ENDURANCE only`; preserve scenario-permitted quality where later Base/Build/rehearsal semantics justify it. Keep objective mismatch warning-only and input-owned. Tool usage: prefer deterministic injected cadence/load context; use `workspace_get_latest` for latest planning artefacts and `workspace_get_version` only for explicit historical week-sensitive evidence."
    expected_output: A structured season progression draft.
    tools:
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_phase_blueprint_draft:
    agent: season_phase_blueprint_specialist
    kind: internal_reasoning
    output: season_phase_blueprint_draft
    context:
      - season_evidence_alignment
      - season_macrocycle_draft
      - season_constraint_review
      - season_kpi_guidance_review
      - season_load_corridor_draft
      - season_progression_review
    description: "Draft the structural Season `phase_blueprints` before final bundle consolidation. Return exactly one structured object with top-level `phase_blueprints` only; do not emit a full Season bundle and do not wrap the output in prose or markdown fences. Apply this order explicitly: exact deterministic authority first, then resolved previous-week evidence, then evidence-alignment implications, then phase-blueprint synthesis. Consume the `season_evidence_alignment` output actively as advisory shaping input for continuity, conservatism, and overreach prevention; it must shape the first real phase-blueprint draft but must not rewrite authority. Use deterministic phase-slot and season phase-load context as binding authority for phase ids, week ranges, cadence roles, load corridors, availability caps, role-week load bands, and legality-constrained semantic fields. `phase_blueprints` are owned here first; `season_plan_finalize` must later preserve and consolidate them rather than inventing them from scratch."
    expected_output: A structured object with top-level `phase_blueprints` containing canonical Season phase draft blueprints only.
    tools:
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_plan_finalize:
    agent: season_plan_manager
    kind: internal_reasoning
    output: season_plan_draft_bundle
    tools:
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
    context:
      - season_context_read
      - season_scenario_interpretation
      - season_event_priority_review
      - season_peak_window_review
      - season_macrocycle_draft
      - season_constraint_review
      - season_historical_context_review
      - season_evidence_alignment
      - season_kpi_guidance_review
      - season_load_corridor_draft
      - season_progression_review
      - season_phase_blueprint_draft
    description: "Consolidate season drafts into one internal SeasonPlanDraftBundle with availability-bounded phase-load blueprints. Return a raw JSON object only; do not wrap the final output in prose or markdown fences. SeasonPlanDraftBundle shape is mandatory: emit top-level `event_priority`, `macrocycle`, and `phase_blueprints` on every finalizer pass. Season final output uses `constraints[]` and `load_governance[]` only; singular top-level `constraint_audit` and `load_governance_audit` keys are invalid final manager output. `phase_blueprints` are owned by the earlier `season_phase_blueprint_draft` task: preserve and consolidate that structural draft here rather than inventing it from scratch. `constraints[]` are owned by `season_constraint_review`, `season_historical_context_review`, and `season_kpi_guidance_review`; preserve and consolidate those canonical audit objects instead of flattening them into row-shaped findings. `load_governance[]` are owned by `season_load_corridor_draft` and `season_progression_review`; preserve and consolidate those canonical governance audit objects instead of rewriting them into ad hoc rows. Use a mandatory 3-pass planner flow: Pass 1 structural draft, Pass 2 semantic finalization, Pass 3 planner self-audit. Exact deterministic authority comes first, then resolved previous-week evidence, then evidence-alignment implications, then synthesis. Audit-slot discipline is mandatory: `constraints[]` contains constraint-audit entries only, `load_governance[]` contains governance-audit entries only, and `cadence_authority_preserved` plus `durability_first_respected` belong only inside `load_governance[]`. Do not place governance audit items inside `constraints[]`, do not collapse both audit families into one list, and do not emit finding-row shapes such as `constraint_type`, `status`, or `summary` inside final Season audit slots. The injected `selected_scenario_contract` is binding Season planning posture: preserve chosen recovery margin, pressure stance, specificity density, legal domain ceiling, and the athlete selection rationale directly in season intent and phase blueprint shaping. The bundle is not review-ready if `selected_scenario_contract` is missing, incomplete, or drifted, or if planner-owned `blocking_issues` still remain. A season may contain one or more target macrocycles; do not assume the final A-event is the only reverse-planning anchor. If multiple A-events are too close for recovery, re-entry, build, and taper, treat them as one A-event peak cluster; if backplanned macrocycles overlap, resolve by event priority and spacing rather than stacking competing taper/build demands. Preserve selected-scenario intensity authority at season level; individual phases may narrow it, but the bundle must not reconstruct season authority backward from Phase Guardrails. Use `HISTORICAL_BASELINE` plus exact previous-week `ACTIVITIES_ACTUAL` and `ACTIVITIES_TREND` as early posture-shaping evidence only: they may make cadence and ramping more conservative, but they must never rewrite legality or deterministic slot/load authority. Pass 2 must actively apply the full progressive overload policy before review: cadence selection rationale, ramp class, deload magnitude, mini-reset handling, reload vs re-entry distinction, fallback behavior, conservative next-baseline logic, and Build-entry readiness gates must already be visible in the bundle. Intent/domain coherence is generic: never emit a Build intent whose defining domain is not legal under inherited season governance. Forbidden-domain narrative coherence is also mandatory: if a phase forbids `THRESHOLD`, `VO2MAX`, or any other domain, do not describe that domain positively anywhere in the phase narrative, metabolic focus, typical focus, expected adaptations, non-negotiables, or phase-justification intensity distribution. Reframe the phase onto the legal phase intent and the actually allowed domains instead. Objective mismatch remains input-owned and warning-only; surface it, but do not rewrite it. Pass 3 must confirm the checklist is complete and classify findings before review: use Pass 2-return findings when structure is valid but rationale or semantics are incomplete; use Pass 1-return findings when macrocycle structure, event anchoring, cadence skeleton, or phase-slot authority is wrong. Finalize must resolve context-solvable semantic contradictions before review: no phantom event semantics, no writer-only repair assumptions, and no unresolved authority drift that still depends on the writer. Use only injected deterministic context, the active task contract, and local active skills as operative sources; historical migration audits and superseded prose are not runtime authority here. Emit structural phase blueprints only: phase ordering, cadence roles, event constraints, load corridors, availability caps, progression traces, and week-role load bands. Treat `phase_blueprints[].event_constraints` as a compact real-event trace, not a narrative bucket. Good examples: `['2026-09-12 A event: dedicated taper-contained event handling.']`, `['2026-08-15 B event: rehearsal within ongoing build.']`, or `[]` when a phase has no real event constraint. Never emit placeholders such as `No target-week event`, `No logistics exception`, or `No event-driven load exception`. Do not invent canonical phase taxonomy fields, deterministic allowed/forbidden domains, semantic contracts, or season load-envelope fields; those are code-owned and added during runtime normalization."
