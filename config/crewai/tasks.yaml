  phase_preview:
    agent: phase_artifact_writer
    kind: persisted_artifact
    output: artifact_envelope
    description: Create the phase-preview artifact envelope for the exact phase range.
    expected_output: Schema-compliant artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.
  phase_feed_forward:
    agent: phase_feed_forward_manager
    kind: persisted_artifact
    output: artifact_envelope
    description: Create the selected-week phase feed-forward artifact envelope.
    expected_output: Schema-compliant artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.

  week_context_read:
    agent: week_context_specialist
    kind: internal_reasoning
    output: week_context_assessment
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_context
      - workspace_get_week_calendar_context
      - workspace_get_phase_execution_context
    description: "Inspect selected-week plan, actuals, and open constraints for planning. Tool usage: use `workspace_get_input` for athlete-managed inputs; use `workspace_get_week_calendar_context` and `workspace_get_phase_execution_context` for deterministic week authority; use `workspace_get_latest` for latest plan/report artefacts; use `workspace_get_version` only for explicit week-sensitive historical artefacts."
    expected_output: A structured week context assessment.
  week_constraint_review:
    agent: week_constraint_specialist
    kind: internal_reasoning
    output: planning_draft
    description: "Summarize binding week-level constraints from upstream artifacts and athlete context. Tool usage: use `workspace_get_input` for athlete-managed inputs; use deterministic week/phase contract tools and `workspace_get_latest` for authoritative context."
    expected_output: A structured week constraint draft.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_week_calendar_context
      - workspace_get_phase_execution_context
  week_load_target_draft:
    agent: week_load_target_specialist
    kind: internal_reasoning
    output: planning_draft
    description: "Convert the active corridor into day and workout target logic for the week. Tool usage: prefer deterministic week/phase contract tools and `workspace_get_latest`; use `workspace_get_version` only for explicit week-sensitive historical artefacts."
