    description: Review the injected candidate phase bundle and writer handoff against deterministic phase slot, phase execution, week-role, and S5-band contracts. Do not retrieve or expect a synthetic `candidate_phase_bundle` workspace artefact.
    expected_output: A structured contract-review draft that treats deterministic phase-contract mismatches as blocking replan reasons.
  phase_review:
    agent: phase_review_manager
    kind: internal_reasoning
