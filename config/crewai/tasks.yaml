tasks:
  classify_turn:
    agent: conversation_manager
    kind: internal_reasoning
    output: turn_mode
    description: Classify one conversational turn into analyze, recommend, create_preview, or resolve_pending.
    expected_output: A structured turn mode with a short routing rationale.
  finalize_reply:
    agent: conversation_manager
    kind: internal_reasoning
    output: coaching_recommendation
    description: Produce the final user-facing reply from one specialist result without changing the specialist decision.
    expected_output: A structured final-reply wrapper whose recommendation field contains the final assistant reply.
  analyze_week_context:
    agent: week_context_specialist
    kind: internal_reasoning
    output: week_context_assessment
    tools: read_only_workspace
    description: Inspect the current selected week and summarize plan, actuals, constraints, and likely change direction.
    expected_output: A structured selected-week context assessment.
  form_coaching_recommendation:
    agent: week_recommendation_specialist
    kind: internal_reasoning
    output: coaching_recommendation
    description: Turn a week-context assessment into direct coaching guidance for an advisory-only turn.
    expected_output: A structured coaching recommendation.
  form_adjustment_intent:
    agent: week_recommendation_specialist
    kind: internal_reasoning
    output: adjustment_intent
    description: Turn a week-context assessment and user request into one clean adjustment intent for preview creation.
    expected_output: A structured adjustment intent suitable for one preview operation.
  create_week_preview:
    agent: week_revision_specialist
    kind: operation
    output: coach_preview_summary
    description: Create exactly one bounded selected-week preview from a structured adjustment intent.
    expected_output: A structured coach preview result for the selected week.
  resolve_pending_operation:
    agent: pending_resolution_specialist
    kind: operation
    output: pending_resolution_result
    description: Inspect, apply, or discard the existing pending preview operation for the current chat surface.
    expected_output: A structured pending-resolution result.
  coach_read_context:
    agent: coach
    kind: operation
    output: coach_preview
    tools: read_only_workspace
    description: Read the selected-week plan context and summarize the current actionable state.
    expected_output: A structured preview-style context summary for the active coach.
  coach_preview_artifact_edit:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview a bounded selected-week artifact edit before any persistence occurs.
    expected_output: A structured preview object including affected artifacts and confirmation requirement.
  coach_apply_artifact_edit:
    agent: coach
    kind: operation
    output: coach_apply
    description: Apply the currently confirmed bounded artifact edit through guarded store operations.
    expected_output: A structured apply result describing stored artifacts and any rebuilds.
  coach_preview_scoped_replan:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview a scoped selected-week replan based on a user instruction.
    expected_output: A structured preview object for the scoped replan.
  coach_apply_scoped_replan:
    agent: coach
    kind: operation
    output: coach_apply
    description: Apply a confirmed scoped selected-week replan and rebuild downstream deterministic artifacts.
    expected_output: A structured apply result for the scoped replan.
  coach_preview_report:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview DES analysis report generation for the selected ISO week.
    expected_output: A structured preview object for report generation.
  coach_apply_report:
    agent: coach
    kind: operation
    output: coach_apply
    description: Run confirmed DES analysis report generation for the selected ISO week.
    expected_output: A structured apply result for report generation.
  coach_preview_feed_forward:
    agent: coach
    kind: operation
    output: coach_preview
    description: Preview the report and feed-forward chain for the selected ISO week.
    expected_output: A structured preview object for the advisory chain.
  coach_apply_feed_forward:
    agent: coach
    kind: operation
    output: coach_apply
    description: Run the confirmed report and feed-forward chain for the selected ISO week.
    expected_output: A structured apply result for the advisory chain.

  season_scenarios:
    agent: season_scenario
    kind: persisted_artifact
    output: artifact_envelope
    tools: read_only_workspace
    description: Create the season-scenarios artifact envelope for the selected planning horizon. Differentiate A/B/C primarily by kJ-envelope, specificity-under-fatigue, density, recovery tolerance, and risk contract; treat intensity domains as permissions rather than the primary scenario identity. Also make the scenarios easy to choose as user-facing options by providing `typical_week_feel`, `main_payoff`, `main_cost`, `what_gets_prioritized`, and `what_gets_de_emphasized`.
    expected_output: Schema-compliant artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.
  season_scenario_selection:
    agent: season_scenario
    kind: persisted_artifact
    output: artifact_envelope
    tools: read_only_workspace
    description: Create the season-scenario-selection artifact envelope from the selected scenario and KPI guidance choice.
    expected_output: Schema-compliant SEASON_SCENARIO_SELECTION artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.
  season_context_read:
    agent: season_context_specialist
    kind: internal_reasoning
    output: planning_draft
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
    description: "Summarize season planning context, selected scenario state, and upstream inputs. Tool usage: use `workspace_get_input` for athlete-managed inputs (`planning_events`, `athlete_profile`, `availability`, `logistics`); use `workspace_get_latest` for latest authoritative planning artefacts and snapshots; use `workspace_get_version` only for explicit week-sensitive historical artefacts."
    expected_output: A structured planning draft for season context.
  season_scenario_interpretation:
    agent: scenario_interpreter
    kind: internal_reasoning
    output: season_event_anchor
    description: Interpret the selected scenario as advisory season intent.
    expected_output: A structured season scenario interpretation.
  season_event_priority_review:
    agent: event_priority_specialist
    kind: internal_reasoning
    output: season_event_anchor
    description: "Define A/B/C priority handling and event anchors for season planning. Tool usage: use `workspace_get_input` for `planning_events`; use `workspace_get_latest` for `SEASON_SCENARIOS`, `SEASON_SCENARIO_SELECTION`, and `ATHLETE_STATE_SNAPSHOT`; use `workspace_get_version` only when a week-sensitive historical artefact is explicitly required."
    expected_output: A structured event-priority draft.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
  season_peak_window_review:
    agent: peak_window_specialist
    kind: internal_reasoning
    output: planning_draft
    description: "Define peak window and taper-window logic for the season plan. Tool usage: use `workspace_get_input` for `planning_events`; use `workspace_get_latest` for selected-scenario and snapshot context; use `workspace_get_version` only for explicit week-sensitive historical artefacts."
    expected_output: A structured planning draft for peak-window logic.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
  season_macrocycle_draft:
    agent: macrocycle_architect
    kind: internal_reasoning
    output: season_macrocycle_draft
    description: "Reverse-plan macrocycle structure from priority event anchors. Tool usage: use `workspace_get_input` for `planning_events`; use `workspace_get_latest` for selected-scenario and snapshot context; use `workspace_get_phase_slot_contract` for deterministic phase-slot structure. Return the structured macrocycle draft directly; do not assume a workspace file-write step."
    expected_output: A structured macrocycle draft with reverse-planning notes.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_phase_slot_contract
  season_constraint_review:
    agent: season_constraint_specialist
    kind: internal_reasoning
    output: constraint_audit
    description: "Summarize binding athlete, availability, logistics, and event constraints for season planning. Include fixed rest days, feasibility bounds, travel/work limitations, and binding event-timing constraints. Keep the result focused on hard and soft constraints only; do not turn KPI semantics, historical continuity, or progression philosophy into primary findings except to note that they cannot override a binding constraint. Tool usage: use `workspace_get_input` for athlete-managed inputs and `workspace_get_latest` for latest authoritative planning artefacts or snapshots."
    expected_output: A structured constraint audit for season planning.
    tools:
      - workspace_get_input
      - workspace_get_latest
  season_historical_context_review:
    agent: season_historical_context_specialist
    kind: internal_reasoning
    output: constraint_audit
    description: "Summarize historical load, recovery, and re-entry implications for the current season run. Focus on recent tolerance, disruption risk, and continuity evidence only. Do not restate fixed rest days, phase corridors, event taper handling, or KPI pacing semantics as primary findings unless needed only to explain the historical evidence boundary. Tool usage: use `workspace_get_version` for week-sensitive `ACTIVITIES_ACTUAL` and `ACTIVITIES_TREND`; use `workspace_get_latest` only for non-week-sensitive supporting artefacts."
    expected_output: A structured historical-context review.
    tools:
      - workspace_get_latest
      - workspace_get_version
  season_kpi_guidance_review:
    agent: season_kpi_guidance_specialist
    kind: internal_reasoning
    output: constraint_audit
    description: "Summarize KPI-profile, moving-time-rate, and pacing-band guidance for season planning. Focus on KPI semantics only: selected KPI bands, moving-time vs elapsed-time interpretation, pacing guardrails, and explicit limits of KPI authority. Do not restate fixed rest days, availability bounds, phase corridors, load caps, event-anchor/taper handling, or historical continuity as primary findings unless needed only to explain why KPI guidance cannot override them. Keep the output centered on pacing/rate-band interpretation rather than general season conservatism. Tool usage: use `workspace_get_latest` for latest KPI and snapshot context; use `workspace_get_input` only for athlete-managed inputs when explicitly needed."
    expected_output: A structured KPI-guidance review.
    tools:
      - workspace_get_input
      - workspace_get_latest
  season_load_corridor_draft:
    agent: season_load_corridor_specialist
    kind: internal_reasoning
    output: load_governance_audit
    description: "Draft season corridor logic and load realism checks. Preserve season-level intensity authority from the selected scenario; do not infer season semantics backward from a narrower Phase Guardrails example. Tool usage: prefer deterministic injected load context and `workspace_get_latest` snapshot/planning artefacts; use `workspace_get_version` only for explicit historical load references."
    expected_output: A structured season load-corridor draft.
    tools:
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_progression_review:
    agent: season_progression_specialist
    kind: internal_reasoning
    output: load_governance_audit
    description: "Draft season progression, cadence, overload, and phase-level domain-shaping guidance. Durability-first means `ENDURANCE` dominant, not `ENDURANCE only`; preserve scenario-permitted quality where later Base/Build/rehearsal semantics justify it. Tool usage: prefer deterministic injected cadence/load context; use `workspace_get_latest` for latest planning artefacts and `workspace_get_version` only for explicit historical week-sensitive evidence."
    expected_output: A structured season progression draft.
    tools:
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_plan_finalize:
    agent: season_plan_manager
    kind: internal_reasoning
    output: season_plan_bundle
    tools:
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
    context:
      - season_context_read
      - season_scenario_interpretation
      - season_event_priority_review
      - season_peak_window_review
      - season_macrocycle_draft
      - season_constraint_review
      - season_historical_context_review
      - season_kpi_guidance_review
      - season_load_corridor_draft
      - season_progression_review
    description: Consolidate season drafts into one internal SeasonPlanBundle with availability-bounded phase-load blueprints. Preserve selected-scenario intensity authority at season level; individual phases may narrow it, but the bundle must not reconstruct season authority backward from Phase Guardrails.
    expected_output: A structured internal season plan bundle with phase_blueprints that preserve inherited selected-scenario cadence roles, phase roles, availability caps, progression traces, role-week load bands, and explicit `allowed_domains`.
  season_governance_review:
    agent: season_governance_auditor
    kind: internal_reasoning
    output: load_governance_audit
    description: "Review the injected candidate season bundle for governance realism and progression compliance. Tool usage: prefer prior specialist context, the injected candidate bundle, and deterministic contracts; use `workspace_get_latest` only for latest authoritative planning artefacts or snapshots when needed, not for any synthetic `candidate_season_bundle` lookup."
    expected_output: A structured load-governance review.
    tools:
      - workspace_get_latest
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_constraints_review:
    agent: season_constraints_reviewer
    kind: internal_reasoning
    output: constraint_audit
    description: "Review the injected candidate season bundle for athlete, event, and logistics constraint compliance. Tool usage: prefer prior specialist context and the injected candidate bundle; use `workspace_get_input` for athlete-managed inputs and `workspace_get_latest` for latest authoritative planning artefacts or snapshots when needed, not for any synthetic `candidate_season_bundle` lookup."
    expected_output: A structured season constraint review.
    tools:
      - workspace_get_input
      - workspace_get_latest
  season_plan_audit:
    agent: season_plan_auditor
    kind: internal_reasoning
    output: season_plan_audit
    description: "Audit the injected candidate season bundle for macrocycle and authority coherence. Block any full-season collapse to `ENDURANCE only` when deterministic selected-scenario authority is broader, while allowing individual phases to stay narrower. Tool usage: prefer prior specialist context, the injected candidate bundle, and deterministic contracts; use `workspace_get_latest` only for latest authoritative planning artefacts or snapshots when needed, not for any synthetic `candidate_season_bundle` lookup."
    expected_output: A structured season-plan audit with warnings and blocking issues.
    tools:
      - workspace_get_latest
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
  season_contract_review:
    agent: season_plan_auditor
    kind: internal_reasoning
    output: planning_draft
    tools:
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
    description: Review the injected candidate season bundle and writer handoff against deterministic selected-scenario, phase-slot, phase-load, season-domain-authority, and snapshot contracts. Do not retrieve or expect a synthetic `candidate_season_bundle` workspace artefact.
    expected_output: A structured contract-review draft that treats code-owned contract mismatches as blocking replan reasons.
  season_review:
    agent: season_review_manager
    kind: internal_reasoning
    output: season_review_decision
    tools:
      - workspace_get_phase_slot_contract
      - workspace_get_season_phase_load_context
    context:
      - season_governance_review
      - season_constraints_review
      - season_plan_audit
      - season_contract_review
    description: Integrate season review outputs and decide approve, reject, or bounded replan against the injected candidate season bundle. Use deterministic contract tools directly when needed; do not reload or expect a synthetic `candidate_season_bundle` workspace artefact.
    expected_output: A structured season review decision.
  season_plan:
    agent: season_artifact_writer
    kind: persisted_artifact
    output: artifact_envelope
    description: Create the season-plan artifact envelope for the selected planning horizon.
    expected_output: Schema-compliant artifact data derived from the approved season bundle and phase blueprints; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.
  season_phase_feed_forward:
    agent: season_feed_forward_manager
    kind: persisted_artifact
    output: artifact_envelope
    description: Create the selected-week season-to-phase feed-forward artifact envelope.
    expected_output: Schema-compliant artifact data; if an envelope is emitted, persisted meta is runtime-owned and non-authoritative.

  phase_context_read:
    agent: phase_context_specialist
    kind: internal_reasoning
    output: planning_draft
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_version
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
    description: "Summarize exact phase-range context and upstream authority. Tool usage: use `workspace_get_input` for athlete-managed inputs; use `workspace_get_phase_context`, `workspace_get_phase_execution_context`, and `workspace_get_phase_slot_contract` for authoritative phase contracts; use `workspace_get_latest` only for latest supporting artefacts."
    expected_output: A structured phase context draft.
  phase_guardrail_band_draft:
    agent: phase_guardrail_band_specialist
    kind: internal_reasoning
    output: phase_guardrails_payload
    description: "Draft weekly band and corridor content for the exact phase range. Tool usage: prefer injected phase context; use phase contract tools or `workspace_get_latest` only when exact authoritative values still need retrieval."
    expected_output: A structured phase-guardrails payload draft.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_execution_rules_draft:
    agent: phase_execution_rules_specialist
    kind: internal_reasoning
    output: phase_guardrails_payload
    description: "Draft allowed/forbidden semantics and execution non-negotiables for the exact phase range. Tool usage: prefer injected phase context; use phase contract tools or `workspace_get_latest` only when exact authoritative values still need retrieval."
    expected_output: A structured phase execution-rules draft.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_structure_draft:
    agent: phase_structure_specialist
    kind: internal_reasoning
    output: phase_structure_payload
    description: "Draft phase structure and week-skeleton logic for the exact phase range. Tool usage: prefer injected phase context; use phase contract tools or `workspace_get_latest` only when exact authoritative values still need retrieval."
    expected_output: A structured phase-structure payload draft.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_cadence_recovery_draft:
    agent: phase_cadence_recovery_specialist
    kind: internal_reasoning
    output: phase_structure_payload
    description: "Apply season cadence, deload, and re-entry logic to the exact phase range. Tool usage: prefer injected phase context; use phase contract tools or `workspace_get_latest` only when exact authoritative values still need retrieval."
    expected_output: A structured cadence/recovery draft for the phase structure.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_intensity_distribution_draft:
    agent: phase_intensity_distribution_specialist
    kind: internal_reasoning
    output: phase_structure_payload
    description: "Draft phase-appropriate intensity handling and density within existing guardrails. Tool usage: prefer injected phase context; use phase contract tools or `workspace_get_latest` only when exact authoritative values still need retrieval."
    expected_output: A structured intensity-handling draft for the phase structure.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_event_integration_draft:
    agent: phase_event_integration_specialist
    kind: internal_reasoning
    output: phase_structure_payload
    description: "Draft B/C event propagation rules inside the phase structure. Tool usage: use `workspace_get_input` for `planning_events`; use phase contract tools or `workspace_get_latest` for authoritative phase and season context."
    expected_output: A structured phase event-integration draft.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_preview_draft:
    agent: phase_preview_synthesizer
    kind: internal_reasoning
    output: phase_preview_payload
    description: "Draft a derived phase preview that adds no new planning decisions. Tool usage: prefer prior specialist context; use phase contract tools or `workspace_get_latest` only when exact authoritative values still need retrieval."
    expected_output: A structured phase-preview payload draft.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_bundle_finalize:
    agent: phase_bundle_manager
    kind: internal_reasoning
    output: phase_bundle
    tools:
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
    context:
      - phase_context_read
      - phase_guardrail_band_draft
      - phase_execution_rules_draft
      - phase_structure_draft
      - phase_cadence_recovery_draft
      - phase_intensity_distribution_draft
      - phase_event_integration_draft
      - phase_preview_draft
    description: Consolidate all internal phase drafts and audits into one internal PhaseBundle before review, including role-aware week blueprints for every phase week.
    expected_output: A structured internal PhaseBundle with week_blueprints.
  phase_constraint_audit:
    agent: phase_constraint_auditor
    kind: internal_reasoning
    output: constraint_audit
    description: "Audit phase constraints, event propagation, and applicable season feed-forward consistency. Tool usage: use `workspace_get_input` for athlete-managed inputs; use phase contract tools or `workspace_get_latest` for authoritative phase/season context."
    expected_output: A structured phase constraint audit.
    tools:
      - workspace_get_input
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_governance_review:
    agent: phase_governance_auditor
    kind: internal_reasoning
    output: load_governance_audit
    description: "Audit phase corridor coherence, durability-first policy, and compression risk. Tool usage: prefer prior specialist context; use phase contract tools or `workspace_get_latest` for authoritative phase context when needed."
    expected_output: A structured phase governance review.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_structure_review:
    agent: phase_structure_reviewer
    kind: internal_reasoning
    output: planning_draft
    description: "Review structural consistency across the injected candidate phase bundle. Tool usage: prefer prior specialist context, the injected candidate bundle, and phase contract tools; use `workspace_get_latest` only for authoritative phase context when needed, not for any synthetic `candidate_phase_bundle` lookup."
    expected_output: A structured phase structure review draft.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_preview_review:
