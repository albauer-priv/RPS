    kind: internal_reasoning
    output: planning_draft
    description: "Review whether the injected candidate phase preview remains derived and non-decisional. Tool usage: prefer prior specialist context, the injected candidate bundle, and phase contract tools; use `workspace_get_latest` only for authoritative phase context when needed, not for any synthetic `candidate_phase_bundle` lookup."
    expected_output: A structured phase preview review draft.
    tools:
      - workspace_get_latest
      - workspace_get_phase_context
      - workspace_get_phase_execution_context
      - workspace_get_phase_slot_contract
  phase_contract_review:
